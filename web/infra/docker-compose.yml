version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: vibehub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vibehub
    ports:
      - "5432:5432"
    volumes:
      - vibehub_pgdata:/var/lib/postgresql/data

volumes:
  vibehub_pgdata:
