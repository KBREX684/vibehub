version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: vibehub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vibehub
    ports:
      - "5432:5432"
    volumes:
      - vibehub_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: vibehub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - vibehub_redis:/data
    command: ["redis-server", "--appendonly", "yes"]

volumes:
  vibehub_pgdata:
  vibehub_redis:
