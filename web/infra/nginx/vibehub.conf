# HTTP — terminate TLS in front (e.g. cloud load balancer) or add `listen 443 ssl` here.
# See `vibehub-tls.conf.example` for a minimal TLS server block template.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream vibehub_next {
    server 127.0.0.1:3000;
}

upstream vibehub_ws {
    server 127.0.0.1:3001;
}

server {
    listen 80;
    server_name _;

    # Team chat WebSocket (ws-server); path must match WS_PATH (default `/ws`)
    location /ws {
        proxy_pass http://vibehub_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location / {
        proxy_pass http://vibehub_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
