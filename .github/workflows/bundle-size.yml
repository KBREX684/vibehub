# P3-INFRA-1: Bundle size tracking — report build output size on PRs.
name: bundle-size

on:
  pull_request:
    branches: [main]

permissions:
  pull-requests: write

jobs:
  report:
    name: Build & report size
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Build (production)
        env:
          USE_MOCK_DATA: "true"
          SESSION_SECRET: ci-session-secret
          NODE_ENV: production
        run: npm run build 2>&1 | tee /tmp/build-output.txt

      - name: Extract bundle sizes
        id: sizes
        run: |
          # Next.js prints a summary table at the end of `next build`.
          # Capture everything from "Route (app)" onward.
          SUMMARY=$(sed -n '/Route (app)/,/First Load JS shared/p' /tmp/build-output.txt || echo "Could not parse build output")
          {
            echo "summary<<ENDOFSUMMARY"
            echo "$SUMMARY"
            echo "ENDOFSUMMARY"
          } >> "$GITHUB_OUTPUT"

      - name: Comment PR with bundle sizes
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: bundle-size
          message: |
            ### 📦 Bundle Size Report

            <details>
            <summary>Next.js build output</summary>

            ```
            ${{ steps.sizes.outputs.summary }}
            ```

            </details>
