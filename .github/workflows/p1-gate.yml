# Lint, test, and build the Next app; also applies Prisma migrations against
# a disposable Postgres so broken SQL migrations fail CI before production.
name: p1-gate

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vibehub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d vibehub"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/vibehub?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma migrate deploy (validates migration SQL)
        run: npx prisma migrate deploy

      - name: Prisma generate
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        env:
          USE_MOCK_DATA: "true"
          NODE_ENV: "production"
          SESSION_SECRET: "ci-session-secret"
        run: npm run build
